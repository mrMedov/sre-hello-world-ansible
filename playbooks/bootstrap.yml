---
- name: Bootstrap clean Debian host for Ansible
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Install Python for Ansible
      ansible.builtin.raw: |
        apt-get update
        apt-get install -y python3 python3-apt
      changed_when: false

    - name: Check Ansible connection
      ansible.builtin.ping: